<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FaciliTrack – Forgot Password</title>
  <link rel="stylesheet" href="auth.login.css" />
  <link rel="stylesheet" href="auth.forgot.css" />
</head>
<body>

  
  <header class="ft-header">
    <div class="ft-header__top">
      Iloilo State University of Fisheries Science and Technology | Main Campus
    </div>
    <div class="ft-header__main">
      <div class="ft-brand">
        <img src="../Images/logo.png" alt="FaciliTrack Logo" class="ft-brand__logo" />
        <span class="ft-brand__name">FaciliTrack</span>
      </div>
      <nav class="ft-nav">
        <a href="auth.login.html" class="ft-nav__link" id="nav-login">Login</a>
        <a href="auth.register.html" class="ft-nav__link" id="nav-register">Register</a>
      </nav>
    </div>
  </header>


  <main class="ft-main">
    <div class="ft-card ft-card--forgot">


      <div class="ft-card__logo-wrap">
        <img src="../Images/logo.png" alt="FaciliTrack Logo" class="ft-card__logo" />
      </div>

      <h1 class="ft-card__title ft-card__title--forgot">Forgot Password</h1>
      <p class="ft-forgot-desc">Enter your registered Gmail address and we will send you an 8-digit verification code.</p>

      <div id="forgot-status" class="ft-status" role="alert" aria-live="polite"></div>


      <div class="ft-field">
        <label for="forgot-gmail" class="ft-field__label">Gmail Address</label>
        <input
          type="email"
          id="forgot-gmail"
          class="ft-field__input"
          placeholder="Enter your registered Gmail"
          autocomplete="email"
        />
      </div>


      <button class="ft-btn" id="send-code-btn">Send Verification Code</button>
      
      <div id="resend-wrap" class="ft-resend" style="display:none;">
        <span id="resend-timer"></span>
        <a href="#" id="resend-link" style="display:none;">Resend Code</a>
      </div>

      <p class="ft-card__alt">
        Remember your password? <a href="auth.login.html">Login here</a>
      </p>
    </div>
  </main>

  <script type="module" src="auth.forgot.js"></script>
</body>
</html>
