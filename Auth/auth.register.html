<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FaciliTrack – Register</title>
  <link rel="stylesheet" href="auth.login.css" />
  <link rel="stylesheet" href="auth.register.css" />
</head>
<body>


  <header class="ft-header">
    <div class="ft-header__top">
      Iloilo State University of Fisheries Science and Technology | Main Campus
    </div>
    <div class="ft-header__main">
      <div class="ft-brand">
        <img src="../Images/logo.png" alt="FaciliTrack Logo" class="ft-brand__logo" />
        <span class="ft-brand__name">FaciliTrack</span>
      </div>
      <nav class="ft-nav">
        <a href="auth.login.html" class="ft-nav__link" id="nav-login">Login</a>
        <a href="auth.register.html" class="ft-nav__link active" id="nav-register">Register</a>
      </nav>
    </div>
  </header>


  <main class="ft-main ft-main--register">
    <div class="ft-card ft-card--register">

      <!-- Logo -->
      <div class="ft-card__logo-wrap">
        <img src="../Images/logo.png" alt="FaciliTrack Logo" class="ft-card__logo" />
      </div>

      <h1 class="ft-card__title ft-card__title--register">Register</h1>

   
      <div id="register-status" class="ft-status" role="alert" aria-live="polite"></div>

     
      <div class="ft-row">
        <div class="ft-field">
          <label for="reg-firstname" class="ft-field__label">First Name</label>
          <input type="text" id="reg-firstname" class="ft-field__input"
                 placeholder="First name" autocomplete="given-name" />
        </div>
        <div class="ft-field">
          <label for="reg-lastname" class="ft-field__label">Last Name</label>
          <input type="text" id="reg-lastname" class="ft-field__input"
                 placeholder="Last name" autocomplete="family-name" />
        </div>
      </div>

  
      <div class="ft-row">
        <div class="ft-field">
          <label for="reg-middlename" class="ft-field__label">Middle Name</label>
          <input type="text" id="reg-middlename" class="ft-field__input"
                 placeholder="Middle name" autocomplete="additional-name" />
        </div>
        <div class="ft-field">
          <label for="reg-gmail" class="ft-field__label">Gmail Account</label>
          <input type="email" id="reg-gmail" class="ft-field__input"
                 placeholder="example@gmail.com" autocomplete="email" />
        </div>
      </div>


      <div class="ft-field">
        <label for="reg-username" class="ft-field__label">Username</label>
        <input type="text" id="reg-username" class="ft-field__input"
               placeholder="Choose a username" autocomplete="username" />
      </div>



      <!-- Password -->

      <div class="ft-field">
        <label for="reg-password" class="ft-field__label">Password</label>
        <div class="ft-field__pw-wrap">
          <input type="password" id="reg-password" class="ft-field__input"
                 placeholder="Create a password" autocomplete="new-password" />
          <button type="button" class="ft-field__eye" id="toggle-password"
                  aria-label="Toggle password visibility">
            <svg id="eye-icon-pw" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                 width="20" height="20"></svg>
          </button>
        </div>
      </div>


      
      <!-- Confirm Password -->




      <div class="ft-field">
        <label for="reg-confirm" class="ft-field__label">Confirm Password</label>
        <div class="ft-field__pw-wrap">
          <input type="password" id="reg-confirm" class="ft-field__input"
                 placeholder="Re-enter your password" autocomplete="new-password" />
          <button type="button" class="ft-field__eye" id="toggle-confirm"
                  aria-label="Toggle confirm password visibility">
            <svg id="eye-icon-confirm" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                 width="20" height="20"></svg>
          </button>
        </div>
      </div>

    
      <button class="ft-btn ft-btn--register" id="register-btn">Register</button>

      <p class="ft-card__alt">
        Already have an account? <a href="auth.login.html" id="go-login">Login here</a>
      </p>

    </div>
  </main>

  <script type="module" src="auth.register.js"></script>
</body>
</html>
