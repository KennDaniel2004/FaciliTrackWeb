<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FaciliTrack – User's</title>
  <link rel="stylesheet" href="../HomeDashboard/dashboard.css" />
  <link rel="stylesheet" href="user.css" />
</head>
<body>

  <!-- ===== TOPBAR ===== -->
  <header class="topbar">
    <div class="topbar-left">
      <button class="hamburger" id="hamburger" aria-label="Toggle sidebar">
        <span></span><span></span><span></span>
      </button>
      <div class="topbar-brand">
        <img src="../Images/logo.png" alt="FaciliTrack" class="topbar-logo" />
        <span class="topbar-name">FaciliTrack</span>
      </div>
    </div>
    <div class="topbar-right">
      <button class="topbar-action-btn" id="topbar-expand" type="button" title="Fullscreen">
        <span class="action-icon">⛶</span>
      </button>
      <div class="topbar-profile" id="profile-trigger">
        <span class="topbar-fullname" id="topbar-fullname">Full name</span>
        <div class="topbar-avatar" id="topbar-avatar">FT</div>
        <div class="dropdown-menu" id="dropdown-menu">
          <button id="logout-btn">🚪 Logout</button>
        </div>
      </div>
    </div>
  </header>

  <!-- ===== LAYOUT ===== -->
  <div class="dash-layout" id="dash-layout">

    <!-- SIDEBAR -->
    <nav class="sidebar" id="sidebar">
      <a href="../HomeDashboard/dashboard.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        Schedule
      </a>
      <a href="../Requests/request.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        Requests
        <span class="nav-badge" id="requests-badge" style="display:none;">0</span>
      </a>
      <a href="user.html" class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
          <line x1="19" y1="8" x2="19" y2="14"/>
          <line x1="22" y1="11" x2="16" y2="11"/>
        </svg>
        User's
      </a>
      <a href="../ChangeStats/change.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        Change Stats
      </a>
      <a href="../History/history.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="12 8 12 12 14 14"/>
          <path d="M3.05 11a9 9 0 1 0 .5-4.5"/>
          <polyline points="3 3 3 8 8 8"/>
        </svg>
        History
      </a>
      <a href="../Monitoring/monitoring.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <line x1="8" y1="21" x2="16" y2="21"/>
          <line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
        Monitoring
      </a>
    </nav>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- MAIN CONTENT -->
    <main class="dash-main">

      <!-- ── USER LIST VIEW ── -->
      <div id="view-users" class="usr-view">
        <div class="usr-page">

          <!-- Summary Cards -->
          <div class="usr-summary-row">
            <div class="usr-summary-card">
              <span class="usr-summary-num" id="count-approved">0</span>
              <span class="usr-summary-label approved-label">Approved</span>
            </div>
            <div class="usr-summary-card">
              <span class="usr-summary-num" id="count-pending">0</span>
              <span class="usr-summary-label pending-label">Pending</span>
            </div>
            <div class="usr-summary-card">
              <span class="usr-summary-num" id="count-total">0</span>
              <span class="usr-summary-label total-label">Total</span>
            </div>
          </div>

          <!-- Toolbar: Add + Search -->
          <div class="usr-toolbar">
            <button class="usr-add-btn" id="btn-add-user">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
                <line x1="19" y1="8" x2="19" y2="14"/>
                <line x1="22" y1="11" x2="16" y2="11"/>
              </svg>
              Add New User
            </button>
            <div class="usr-search-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
              </svg>
              <input type="text" id="usr-search" placeholder="Search User's" />
            </div>
          </div>

          <!-- Tabs -->
          <div class="usr-tabs">
            <button class="usr-tab active" id="tab-active" data-tab="active">Active User's</button>
            <button class="usr-tab" id="tab-pending" data-tab="pending">Pending Account's</button>
            <div class="usr-tab-underline" id="tab-underline"></div>
          </div>

          <!-- Active Users Grid -->
          <div id="panel-active" class="usr-panel">
            <div id="active-grid" class="usr-active-grid">
              <div class="usr-empty">
                <div class="usr-empty-icon">☁️</div>
                <div class="usr-empty-title">Ooops....</div>
                <div class="usr-empty-sub">No Active User Found</div>
              </div>
            </div>
          </div>

          <!-- Pending List -->
          <div id="panel-pending" class="usr-panel hidden">
            <div id="pending-list" class="usr-pending-list">
              <div class="usr-empty">
                <div class="usr-empty-icon">☁️</div>
                <div class="usr-empty-title">Ooops....</div>
                <div class="usr-empty-sub">No Pending User</div>
              </div>
            </div>
          </div>

        </div>
      </div>

      <!-- ── REGISTER NEW USER FORM ── -->
      <div id="view-register" class="usr-view hidden">
        <div class="usr-register-wrap">
          <div class="usr-register-card">

            <!-- Back button -->
            <button class="usr-back-btn" id="btn-back">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                <polyline points="15 18 9 12 15 6"/>
              </svg>
            </button>

            <!-- Logo -->
            <div class="usr-reg-logo-wrap">
              <img src="../Images/logo.png" alt="FaciliTrack" class="usr-reg-logo" />
            </div>

            <h2 class="usr-reg-title">Register New User</h2>

            <!-- Status -->
            <div id="reg-status" class="usr-reg-status" style="display:none;"></div>

            <!-- ID Number -->
            <div class="usr-reg-field">
              <label class="usr-reg-label">ID Number</label>
              <input type="text" id="reg-id" class="usr-reg-input"
                     placeholder="e.g. POB-2022-0956" autocomplete="off" />
            </div>

            <!-- Password -->
            <div class="usr-reg-field">
              <label class="usr-reg-label">Password</label>
              <div class="usr-reg-pw-wrap">
                <input type="password" id="reg-password" class="usr-reg-input"
                       placeholder="Password" autocomplete="new-password" />
                <button type="button" class="usr-reg-eye" id="toggle-reg-pw" aria-label="Toggle password">
                  <svg id="eye-reg-pw" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                       stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                    <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                    <line x1="1" y1="1" x2="23" y2="23"/>
                  </svg>
                </button>
              </div>
            </div>

            <!-- Buttons -->
            <div class="usr-reg-btns">
              <button class="usr-reg-btn usr-reg-btn--gen" id="btn-generate-pw">Generate Password</button>
              <button class="usr-reg-btn usr-reg-btn--reg" id="btn-register-user">Register</button>
            </div>

          </div>
        </div>
      </div>

    </main>
  </div>

  <!-- ===== LOGOUT MODAL ===== -->
  <div id="logout-modal" class="modal hidden">
    <div class="modal-overlay" id="modal-overlay"></div>
    <div class="modal-container">
      <div class="modal-header"><h3>Confirm Logout</h3></div>
      <div class="modal-body"><p>Are you sure you want to logout?</p></div>
      <div class="modal-footer">
        <button class="modal-btn cancel-btn" id="modal-cancel">Cancel</button>
        <button class="modal-btn confirm-btn" id="modal-confirm">Logout</button>
      </div>
    </div>
  </div>

  <script type="module" src="user.js"></script>
</body>
</html>
