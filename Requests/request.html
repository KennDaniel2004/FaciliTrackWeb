
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FaciliTrack – Requests</title>
  <link rel="stylesheet" href="../HomeDashboard/dashboard.css" />
  <link rel="stylesheet" href="request.css" />
</head>
<body>

  <!-- ===== TOPBAR ===== -->
  <header class="topbar">
    <div class="topbar-left">
      <button class="hamburger" id="hamburger" aria-label="Toggle sidebar">
        <span></span><span></span><span></span>
      </button>
      <div class="topbar-brand">
        <img src="../Images/logo.png" alt="FaciliTrack" class="topbar-logo" />
        <span class="topbar-name">FaciliTrack</span>
      </div>
    </div>
    <div class="topbar-right">
      <button class="topbar-action-btn" id="topbar-expand" type="button" title="Fullscreen">
        <span class="action-icon">⛶</span>
      </button>
      <div class="topbar-profile" id="profile-trigger">
        <span class="topbar-fullname" id="topbar-fullname">Full name</span>
        <div class="topbar-avatar" id="topbar-avatar">FT</div>
        <div class="dropdown-menu" id="dropdown-menu">
        <button id="logout-btn">🚪 Logout</button>
      </div>
    </div>
  </header>

  <!-- ===== LAYOUT ===== -->
  <div class="dash-layout" id="dash-layout">

    <!-- SIDEBAR -->
    <nav class="sidebar" id="sidebar">
      <a href="../HomeDashboard/dashboard.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        Schedule
      </a>
      <a href="request.html" class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        Requests
        <span class="nav-badge" id="requests-badge" style="display:none;">0</span>
      </a>
      <a href="../User/user.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
          <line x1="19" y1="8" x2="19" y2="14"/>
          <line x1="22" y1="11" x2="16" y2="11"/>
        </svg>
        User's
      </a>
      <a href="../ChangeStats/change.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        Change Stats
      </a>
      <a href="../History/history.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="12 8 12 12 14 14"/>
          <path d="M3.05 11a9 9 0 1 0 .5-4.5"/>
          <polyline points="3 3 3 8 8 8"/>
        </svg>
        History
      </a>
      <a href="../Monitoring/monitoring.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <line x1="8" y1="21" x2="16" y2="21"/>
          <line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
        Monitoring
      </a>
    </nav>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- MAIN CONTENT -->
    <main class="dash-main">
      <div class="req-page">

        <!-- Page Header -->
        <div class="req-header-row">
          <h1 class="req-page-title">User's Requests</h1>
          <div class="req-search-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
            </svg>
            <input type="text" id="req-search" placeholder="Search requests..." />
          </div>
        </div>

        <!-- Table -->
        <div class="req-table-wrap">
          <table class="req-table">
            <thead>
              <tr>
                <th>User Id</th>
                <th>Full name</th>
                <th>ID Number</th>
                <th>Event</th>
                <th>Venue</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="req-tbody">
              <!-- Rows injected by JS -->
            </tbody>
          </table>

          <!-- Empty state (shown when no requests) -->
          <div id="req-empty" class="req-empty hidden">
            <div class="req-empty-text">Oops No Requests</div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- ===== APPROVE MODAL ===== -->
  <div id="modal-approve" class="req-modal hidden">
    <div class="req-modal-overlay" id="approve-overlay"></div>
    <div class="req-modal-card">
      <button class="req-modal-back" id="approve-back" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="20" height="20">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <h2 class="req-modal-title">Approve Request</h2>
      <div class="req-modal-details" id="approve-details">
        <!-- Details injected by JS -->
      </div>
      <button class="req-modal-action-btn req-modal-action-btn--approve" id="btn-confirm-approve">
        Approve
      </button>
    </div>
  </div>

  <!-- ===== REJECT MODAL ===== -->
  <div id="modal-reject" class="req-modal hidden">
    <div class="req-modal-overlay" id="reject-overlay"></div>
    <div class="req-modal-card">
      <button class="req-modal-back" id="reject-back" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="20" height="20">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <h2 class="req-modal-title">Reject Request</h2>
      <div class="req-modal-details" id="reject-details">
        <!-- Details injected by JS -->
      </div>
      <div class="req-reason-field">
        <label class="req-reason-label">Reason Of Rejection</label>
        <textarea id="rejection-reason" class="req-reason-textarea" placeholder="Enter reason for rejection…"></textarea>
      </div>
      <button class="req-modal-action-btn req-modal-action-btn--reject" id="btn-confirm-reject">
        Reject
      </button>
    </div>
  </div>

  <!-- ===== VIEW MODAL ===== -->
  <div id="modal-view" class="req-modal hidden">
    <div class="req-modal-overlay" id="view-overlay"></div>
    <div class="req-modal-card">
      <button class="req-modal-back" id="view-back" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="20" height="20">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <h2 class="req-modal-title">Request Details</h2>
      <div class="req-modal-details" id="view-details">
        <!-- Details injected by JS -->
      </div>
    </div>
  </div>

  <!-- ===== CONFIRM ACTION MODAL (double-confirmation) ===== -->
  <div id="modal-confirm" class="req-confirm-modal hidden">
    <div class="req-modal-overlay" id="confirm-overlay"></div>
    <div class="req-confirm-card">
      <div class="req-confirm-icon" id="confirm-icon">✓</div>
      <h3 class="req-confirm-title" id="confirm-title">Confirm Action</h3>
      <p class="req-confirm-msg" id="confirm-msg">Are you sure?</p>
      <div class="req-confirm-btns">
        <button class="req-confirm-btn req-confirm-btn--cancel" id="confirm-cancel">Cancel</button>
        <button class="req-confirm-btn req-confirm-btn--ok" id="confirm-ok">Confirm</button>
      </div>
    </div>
  </div>

  <!-- ===== LOGOUT MODAL ===== -->
  <div id="logout-modal" class="modal hidden">
    <div class="modal-overlay" id="modal-overlay"></div>
    <div class="modal-container">
      <div class="modal-header"><h3>Confirm Logout</h3></div>
      <div class="modal-body"><p>Are you sure you want to logout?</p></div>
      <div class="modal-footer">
        <button class="modal-btn cancel-btn" id="modal-cancel">Cancel</button>
        <button class="modal-btn confirm-btn" id="modal-confirm-logout">Logout</button>
      </div>
    </div>
  </div>

  <script type="module" src="request.js"></script>
</body>
</html>
